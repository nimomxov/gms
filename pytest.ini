[pytest]
# GMS Test Suite configuration
# Run with:  pytest  (from project root)

testpaths      = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Show locals on failure, verbose, short traceback for cleaner output
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    backend:     Pure backend test — no Qt/UI required
    integration: Requires Qt application (skipped in headless CI)
    slow:        Long-running test (skipped by default in fast mode)

# Ignore Qt-specific noise in warnings
filterwarnings =
    ignore::DeprecationWarning:PySide6.*
    ignore::RuntimeWarning:numpy.*
